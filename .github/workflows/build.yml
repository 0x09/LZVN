name: Build
on:
  push:
  pull_request:
jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: make
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: make
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw32\bin" >> $GITHUB_PATH
        shell: bash
      - name: Build
        run: make
        shell: bash
        env:
          CC: gcc
  build-freebsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['13.5', '14.4', '15.0']
    defaults:
      run:
        shell: cpa.sh {0}
    steps:
      - uses: actions/checkout@v7
      - name: Start VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: freebsd
          architecture: x86-64
          version: ${{ matrix.version }}
      - name: Build in default configuration
        run: |
          sudo pkg update
          sudo pkg install -y gmake
          gmake
  build-openbsd:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: cpa.sh {0}
    steps:
      - uses: actions/checkout@v7
      - name: Start VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: openbsd
          architecture: x86-64
          version: '7.9'
      - name: Build
        run: |
          sudo pkg_add gmake
          gmake
  build-netbsd:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['9.4', '10.1']
    defaults:
      run:
        shell: cpa.sh {0}
    steps:
      - uses: actions/checkout@v7
      - name: Start VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: netbsd
          architecture: x86-64
          version: ${{ matrix.version }}
      - name: Build
        run: |
          sudo pkgin update
          sudo pkgin -y install gmake
          gmake
  build-haiku:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: cpa.sh {0}
    steps:
      - uses: actions/checkout@v7
      - name: Start VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: haiku
          architecture: x86-64
          version: r1beta5
      - name: Build
        run: make
